services:
  - type: web
    name: wasco-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MYSQL_HOST
        value: containers-us-west-123.railway.app # Replace with your actual MySQL host
      - key: MYSQL_PORT
        value: 3306
      - key: MYSQL_USER
        value: root  # Replace with your actual MySQL username
      - key: MYSQL_PASSWORD
        value: NewPass123  # Replace with your actual MySQL password
      - key: MYSQL_DATABASE
        value: wasco_db
      - key: POSTGRES_HOST
        fromDatabase:
          name: wasco-postgres
          property: host
      - key: POSTGRES_PORT
        value: 5432
      - key: POSTGRES_USER
        fromDatabase:
          name: wasco-postgres
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: wasco-postgres
          property: password
      - key: POSTGRES_DATABASE
        value: wasco_analytics
      - key: JWT_SECRET
        value: wasco_super_secret_key_change_in_production_2024
      - key: JWT_REFRESH_SECRET
        value: wasco_refresh_secret_key_change_in_production_2024
      - key: FRONTEND_URL
        value: https://wascobs.vercel.app
      - key: CORS_ORIGIN
        value: https://wascobs.vercel.app



databases:
  - name: wasco-mysql
    engine: mysql
    version: 8
  - name: wasco-postgres
    engine: postgres
    version: 14

